<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音视频合成 - Res-Find</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1b1e;
      color: #e4e5e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      min-height: 100vh;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .sub { color: #888; font-size: 13px; margin-bottom: 24px; }
    .card {
      background: #232529;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      margin-bottom: 16px;
    }
    .card label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .card .url { font-size: 12px; word-break: break-all; color: #aaa; margin-bottom: 8px; }
    .card video, .card audio { width: 100%; border-radius: 6px; }

    .progress-wrap {
      display: none;
      margin: 16px 0;
    }
    .progress-bar {
      height: 6px;
      background: #2c2e33;
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #6c63ff;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .progress-text { font-size: 12px; color: #888; margin-top: 4px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary { background: #6c63ff; color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-success { background: #22c55e; color: white; }
    .btn-success:hover { opacity: 0.85; }

    .status { font-size: 13px; margin: 12px 0; text-align: center; }
    .error { color: #ef4444; }
    .success { color: #22c55e; }
  </style>
</head>
<body>
  <h1>音视频合成</h1>
  <p class="sub">将分离的视频和音频合并为一个包含音轨的视频文件</p>

  <div class="card">
    <label>视频来源</label>
    <div class="url" id="videoUrl"></div>
    <video id="videoPreview" controls muted></video>
  </div>

  <div class="card">
    <label>音频来源</label>
    <div class="url" id="audioUrl"></div>
    <audio id="audioPreview" controls></audio>
  </div>

  <div class="card">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">准备中...</div>
    </div>
    <div class="status" id="status">就绪</div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" id="startBtn">开始合成</button>
      <button class="btn btn-success" id="downloadBtn" style="display:none;">下载合成文件</button>
    </div>
  </div>

  <script src="merge.js"></script>
</body>
</html>
